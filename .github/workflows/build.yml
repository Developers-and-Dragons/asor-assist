name: Build (Develop)

on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop]
  workflow_dispatch:

jobs:
  build-and-test:
    strategy:
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            artifact-name: AsorAssistant-win-x64
          - os: macos-latest
            rid: osx-arm64
            artifact-name: AsorAssistant-osx-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore AsorAssistant.slnx

      - name: Build
        run: dotnet build AsorAssistant.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test AsorAssistant.slnx --configuration Release --no-build --verbosity normal

      - name: Publish (Windows)
        if: runner.os == 'Windows'
        run: >
          dotnet publish src/AsorAssistant.App/AsorAssistant.App.csproj
          --configuration Release
          --runtime ${{ matrix.rid }}
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          --output ./publish

      - name: Publish (macOS)
        if: runner.os == 'macOS'
        run: >
          dotnet publish src/AsorAssistant.App/AsorAssistant.App.csproj
          --configuration Release
          --runtime ${{ matrix.rid }}
          --self-contained true
          --output ./publish

      - name: Create .app bundle (macOS)
        if: runner.os == 'macOS'
        run: ./scripts/macos/create-app-bundle.sh ./publish "./Asor Assistant.app"

      - name: Import macOS signing certificate
        if: runner.os == 'macOS'
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
        run: |
          if [ -z "$MACOS_CERTIFICATE" ]; then
            echo "No signing certificate configured, skipping."
            exit 0
          fi
          echo "$MACOS_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p buildchain build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p buildchain build.keychain
          security import certificate.p12 -k build.keychain -P "$MACOS_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k buildchain build.keychain
          rm certificate.p12

      - name: Sign .app bundle
        if: runner.os == 'macOS'
        env:
          MACOS_SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
        run: |
          if [ -z "$MACOS_SIGNING_IDENTITY" ]; then
            echo "No signing identity configured, skipping."
            exit 0
          fi
          APP="./Asor Assistant.app"
          MACOS="$APP/Contents/MacOS"
          # Defensive: ensure managed files are not executable so codesign doesn't treat them as nested code.
          find "$MACOS" -type f \( -name "*.dll" -o -name "*.json" -o -name "*.pdb" -o -name "*.dat" -o -name "*.txt" \) -exec chmod a-x {} \; 2>/dev/null || true

          echo "Signing bundled Mach-O binaries..."
          # Sign native dylibs + any executable Mach-O files (main app, createdump, etc).
          find "$MACOS" -type f \( -name "*.dylib" -o -perm -111 \) -print0 \
            | xargs -0 codesign --force --options runtime --timestamp --sign "$MACOS_SIGNING_IDENTITY"

          echo "Signing app bundle (deep)..."
          codesign --force --deep --options runtime --timestamp --sign "$MACOS_SIGNING_IDENTITY" "$APP"

          echo "Verifying signatures..."
          codesign --verify --deep --strict --verbose=4 "$APP"

      - name: Create macOS distribution zip
        if: runner.os == 'macOS'
        run: |
          mkdir -p ./dist
          ditto -c -k --keepParent "./Asor Assistant.app" ./dist/AsorAssistant_macOS_ARM64.zip

      - name: Upload artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}-unsigned
          path: ./publish/
          retention-days: 14

      - name: Upload artifact (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}-unsigned
          path: ./dist/AsorAssistant_macOS_ARM64.zip
          retention-days: 14
